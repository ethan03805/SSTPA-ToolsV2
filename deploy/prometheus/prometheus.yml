# SSTPA Tools Prometheus configuration (SRS §5.6.3)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sstpa-backend
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
