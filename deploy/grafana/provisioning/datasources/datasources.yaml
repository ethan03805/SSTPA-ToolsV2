# SSTPA Tools Grafana data sources (SRS §5.6.5)
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: sstpa-prometheus

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: sstpa-tempo
    jsonData:
      tracesToMetrics:
        datasourceUid: sstpa-prometheus
